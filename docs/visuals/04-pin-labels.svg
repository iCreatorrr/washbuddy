<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="600" height="200" fill="#E8EDE7"/>

  <g transform="translate(60, 20)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#0F172A" font-weight="500">Top-tier (always visible)</text>
    <g transform="translate(50, 60)">
      <rect x="-26" y="-6" width="52" height="18" rx="5" fill="#2D6FE3"/>
      <text x="0" y="6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="white" font-weight="500" text-anchor="middle">+6 min</text>
      <g transform="translate(-16, 22)">
        <path d="M16 2 C 7 2, 2 9, 2 16 C 2 25, 16 38, 16 38 C 16 38, 30 25, 30 16 C 30 9, 25 2, 16 2 Z" fill="#2D6FE3" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="16" cy="15" r="9" fill="#FFFFFF"/>
        <path d="M16 9 C 16 9, 12 13, 12 16 a 4 4 0 0 0 8 0 c 0 -3 -4 -7 -4 -7 z" fill="#2D6FE3"/>
      </g>
    </g>
    <text x="0" y="140" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569">Saturated blue label</text>
    <text x="0" y="153" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569">always shown above pin</text>
  </g>

  <g transform="translate(220, 20)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#0F172A" font-weight="500">Mid-tier at zoom ≥13</text>
    <g transform="translate(50, 60)">
      <rect x="-22" y="-5" width="44" height="16" rx="5" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.5"/>
      <text x="0" y="6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#1F52B0" font-weight="500" text-anchor="middle">+14m</text>
      <g transform="translate(-13, 19)">
        <path d="M13 2 C 6 2, 2 7, 2 13 C 2 21, 13 31, 13 31 C 13 31, 24 21, 24 13 C 24 7, 20 2, 13 2 Z" fill="#6B9AED" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="13" cy="12" r="7" fill="#FFFFFF"/>
        <path d="M13 7 C 13 7, 10 11, 10 13 a 3 3 0 0 0 6 0 c 0 -2 -3 -6 -3 -6 z" fill="#6B9AED"/>
      </g>
    </g>
    <text x="0" y="140" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569">Subtle white label,</text>
    <text x="0" y="153" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569">only at zoom ≥13</text>
  </g>

  <g transform="translate(380, 20)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#0F172A" font-weight="500">Top-tier expanded (zoom ≥13)</text>
    <g transform="translate(75, 60)">
      <rect x="-65" y="-6" width="130" height="18" rx="5" fill="#2D6FE3"/>
      <text x="0" y="6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="white" font-weight="500" text-anchor="middle">Maple Leaf · +6 min</text>
      <g transform="translate(-16, 22)">
        <path d="M16 2 C 7 2, 2 9, 2 16 C 2 25, 16 38, 16 38 C 16 38, 30 25, 30 16 C 30 9, 25 2, 16 2 Z" fill="#2D6FE3" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="16" cy="15" r="9" fill="#FFFFFF"/>
        <path d="M16 9 C 16 9, 12 13, 12 16 a 4 4 0 0 0 8 0 c 0 -3 -4 -7 -4 -7 z" fill="#2D6FE3"/>
      </g>
    </g>
    <text x="0" y="140" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569">Same label expands to</text>
    <text x="0" y="153" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569">include provider name</text>
  </g>
</svg>
