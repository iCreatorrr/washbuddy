<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <rect width="400" height="120" fill="#F8FAFC"/>

  <g transform="translate(30, 30)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#0F172A" font-weight="500">No active sheet filters</text>
    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="76" height="32" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="0.5"/>
      <path d="M12 12 l 14 0 l -5 8 l 0 6 l -4 0 l 0 -6 l -5 -8" fill="none" stroke="#0F172A" stroke-width="2"/>
      <text x="32" y="20" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#0F172A" font-weight="500">Filters</text>
    </g>
  </g>

  <g transform="translate(180, 30)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#0F172A" font-weight="500">3 active sheet filters</text>
    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="92" height="32" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="0.5"/>
      <path d="M12 12 l 14 0 l -5 8 l 0 6 l -4 0 l 0 -6 l -5 -8" fill="none" stroke="#0F172A" stroke-width="2"/>
      <text x="32" y="20" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#0F172A" font-weight="500">Filters</text>
      <circle cx="78" cy="16" r="8" fill="#2D6FE3"/>
      <text x="78" y="19.5" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="white" font-weight="500" text-anchor="middle">3</text>
    </g>
  </g>

  <text x="30" y="92" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569">Right-aligned (margin-left: auto) for thumb reach. Badge appears only when count ≥1.</text>
</svg>
