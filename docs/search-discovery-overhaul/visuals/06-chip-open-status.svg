<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 130" width="500" height="130">
  <rect width="500" height="130" fill="#F8FAFC"/>

  <g transform="translate(30, 30)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#0F172A" font-weight="500">Route mode (ON, default)</text>
    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="130" height="32" rx="16" fill="#EBF2FD" stroke="#93BBF6" stroke-width="0.5"/>
      <circle cx="14" cy="16" r="3" fill="#15803D"/>
      <text x="22" y="20" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#1F52B0" font-weight="500">Open at arrival</text>
    </g>
  </g>

  <g transform="translate(190, 30)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#0F172A" font-weight="500">Nearby mode (ON, default)</text>
    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="100" height="32" rx="16" fill="#EBF2FD" stroke="#93BBF6" stroke-width="0.5"/>
      <circle cx="14" cy="16" r="3" fill="#15803D"/>
      <text x="22" y="20" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#1F52B0" font-weight="500">Open now</text>
    </g>
  </g>

  <g transform="translate(320, 30)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#0F172A" font-weight="500">OFF (toggled off)</text>
    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="100" height="32" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="0.5"/>
      <circle cx="14" cy="16" r="3" fill="#94A3B8"/>
      <text x="22" y="20" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#475569">Open now</text>
    </g>
  </g>

  <text x="30" y="98" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569">When OFF: closed locations also appear in results, with red dot and "Closed" status on cards.</text>
</svg>
